<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-kreis-32x32.png"
    />

    <title>Katia Reis | Social Links</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <main class="profile-card">
      <!-- Profile Image -->
      <figure>
        <img
          src="./assets/images/avatar-katia-reis.png"
          alt="Kátia Reis Web developer and Designer"
          class="profile-img"
        />
      </figure>

      <!-- Personal Information -->
      <h1 class="profile-name">Katia Reis</h1>
      <p class="profile-location">São Paulo, Brazil</p>
      <p class="profile-bio">“Front-end developer and Web Designer”</p>

      <!-- Social Links -->
      <nav class="profile-links">
        <ul>
          <li>
            <a
              href="https://github.com/devkatiareis"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >GitHub</a
            >
          </li>
          <li>
            <a
              href="https://www.linkedin.com/in/katiareis/"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >LinkedIn</a
            >
          </li>
          <li>
            <a
              href="https://www.katiareis.com.br"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Portfolio</a
            >
          </li>
          <li>
            <a
              href="#"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Behance</a
            >
          </li>
          <li>
            <a
              href="https://www.frontendmentor.io/profile/devkatiareis"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Frontend Mentor</a
            >
          </li>
        </ul>
      </nav>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://github.com/devkatiareis"
        target="_blank"
        rel="noopener noreferrer"
        >Katia Reis</a
      >.
    </footer>
  </body>
</html>
